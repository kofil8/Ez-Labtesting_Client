name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run remote deploy script on EC2
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            set -e
            echo "===> Deploy started on $(date)"

            cd "${{ secrets.APP_DIR }}" || { echo "APP_DIR not found"; exit 1; }

            git fetch origin "${{ secrets.BRANCH }}"
            git reset --hard "origin/${{ secrets.BRANCH }}"
            git clean -fd -e .env.production -e ecosystem.config.js

            rm -rf .next && rm -rf node_modules && rm -f yarn.lock

            export NODE_ENV=production

            yarn install || { echo "Failed to install dependencies"; exit 1; }
            yarn build || { echo "Failed to build application"; exit 1; }

            if pm2 describe "${{ secrets.PM2_PROCESS }}" > /dev/null 2>&1; then
              pm2 restart "${{ secrets.PM2_PROCESS }}"
            else
              pm2 start ecosystem.config.js --env production --name "${{ secrets.PM2_PROCESS }}"
            fi

            pm2 save
            echo "===> Deploy finished on $(date)"

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
